services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: warehouse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  business:
    build:
      context: ./business-backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/warehouse"
      HOST: "0.0.0.0"
      PORT: "8001"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      AI_ENGINE_URL: "http://cv-engine:8000"
      GO2RTC_URL: "http://host.docker.internal:1984"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Set INTERNAL_API_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?Set SUPER_ADMIN_PASSWORD in .env}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@warehouse.local}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@warehouse.com}
    volumes:
      - ./docker/entrypoint-business.sh:/app/entrypoint.sh:ro
      - ./models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["bash", "/app/entrypoint.sh"]

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    volumes:
      - ./go2rtc/entrypoint.sh:/entrypoint.sh:ro
    environment:
      NVR_HOST: ${NVR_HOST:?Set NVR_HOST in .env}
      NVR_PORT: ${NVR_PORT:-34567}
      NVR_USER: ${NVR_USER:?Set NVR_USER in .env}
      NVR_PASS: ${NVR_PASS:?Set NVR_PASS in .env}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped

  cv-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.cv
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BUSINESS_BACKEND_URL: "http://business:8001"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Set INTERNAL_API_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MODEL_PATH: "/app/models/box_model.pt"
      HOST: "0.0.0.0"
      PORT: "8000"
      GO2RTC_URL: "http://host.docker.internal:1984"
      GO2RTC_RTSP_HOST: "host.docker.internal"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility,video"
      OPENCV_FFMPEG_CAPTURE_OPTIONS: "rtsp_transport;tcp"
    volumes:
      - stream-cache:/app/backend/stream_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      go2rtc:
        condition: service_started
      business:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        BACKEND_URL: "http://business:8001"
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: "http://localhost:3000"
      BACKEND_URL: "http://business:8001"
    depends_on:
      business:
        condition: service_healthy

volumes:
  pgdata:
  stream-cache:
