services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  business:
    build:
      context: ./business-backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/warehouse"
      HOST: "0.0.0.0"
      PORT: "8001"
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      AI_ENGINE_URL: "http://cv-engine:8000"
      GO2RTC_URL: "http://host.docker.internal:1984"
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-superadmin123}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@warehouse.local}
    volumes:
      - ./docker/entrypoint-business.sh:/app/entrypoint.sh:ro
      - ./models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["bash", "/app/entrypoint.sh"]

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    volumes:
      - ./go2rtc/entrypoint.sh:/entrypoint.sh:ro
    environment:
      NVR_HOST: ${NVR_HOST:-192.168.1.35}
      NVR_PORT: ${NVR_PORT:-34567}
      NVR_USER: ${NVR_USER:-uxdp}
      NVR_PASS: ${NVR_PASS:-cw8adc}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped

  cv-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.cv
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BUSINESS_BACKEND_URL: "http://business:8001"
      MODEL_PATH: "/app/models/box_model.pt"
      HOST: "0.0.0.0"
      PORT: "8000"
      GO2RTC_URL: "http://host.docker.internal:1984"
      GO2RTC_RTSP_HOST: "host.docker.internal"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility,video"
      OPENCV_FFMPEG_CAPTURE_OPTIONS: "rtsp_transport;tcp"
    volumes:
      - stream-cache:/app/backend/stream_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      go2rtc:
        condition: service_started
      business:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        BACKEND_URL: "http://business:8001"
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: "http://localhost:3000"
      BACKEND_URL: "http://business:8001"
    depends_on:
      business:
        condition: service_healthy

volumes:
  pgdata:
  stream-cache:
