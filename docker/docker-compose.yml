version: "3.9"

services:
  warehouse-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: warehouse-ai
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../videos:/app/videos
      - ../models:/app/models
    environment:
      - DISPLAY=${DISPLAY:-:0}
    stdin_open: true
    tty: true
    command: ["--source", "videos/sample.mp4"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  warehouse-ai-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: warehouse-ai-cpu
    ports:
      - "8001:8000"
    volumes:
      - ../data:/app/data
      - ../videos:/app/videos
      - ../models:/app/models
    stdin_open: true
    tty: true
    command: ["--source", "videos/sample.mp4", "--no-display"]
